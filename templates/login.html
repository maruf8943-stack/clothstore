{% extends 'base.html' %}
{% block title %}Login — ClothStore{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>
    <form method="post">
      <div class="form-group">
        <label>Email or Phone Number</label>
        <input type="text" name="identifier" placeholder="email@example.com or 01xxxxxxxxx" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <div style="text-align:right;margin-bottom:12px;">
        <a href="{{ url_for('forgot_password') }}" style="font-size:.82rem;color:#e11d48;text-decoration:none;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-accent btn-full">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
