{% extends 'base.html' %}
{% block title %}Forgot Password — ClothStore{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Forgot Password?</h1>
      <p>Enter your email or phone to get a reset link</p>
    </div>
    <form method="post">
      <div class="form-group">
        <label>Email or Phone Number</label>
        <input type="text" name="identifier" placeholder="email@example.com or 01xxxxxxxxx" required autofocus>
      </div>
      <button type="submit" class="btn btn-accent btn-full">Send Reset Link</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
