{% extends 'base.html' %}
{% block title %}Reset Password — ClothStore{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Set New Password</h1>
      <p>Choose a strong new password</p>
    </div>
    <form method="post">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required minlength="6" autofocus>
      </div>
      <button type="submit" class="btn btn-accent btn-full">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
