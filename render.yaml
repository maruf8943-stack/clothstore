services:
  - type: web
    name: clothstore
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clothstore-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: clothstore-db
    plan: free
    databaseName: clothstore